name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    # Debian trixie is the first Debian with GIMP 3 dev packages.
    container: debian:trixie-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + GIMP/GEGL/babl dev files
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            meson ninja-build gcc pkg-config \
            libglib2.0-dev libgegl-dev libgimp-3.0-dev gegl ca-certificates
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: Smoke test (GEGL registers the op) + artifacts exist
        run: |
          test -f build/src/gegl-palette-quantize.so
          test -f build/src/gimp-palette-quantize
          GEGL_PATH="$PWD/build/src" gegl --list-all | grep -q 'custom:palette-quantize'
      - uses: actions/upload-artifact@v4
        with:
          name: gimp-palette-quantize-linux
          path: |
            build/src/gegl-palette-quantize.so
            build/src/gimp-palette-quantize
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-babl
            mingw-w64-ucrt-x86_64-gegl
            mingw-w64-ucrt-x86_64-gimp
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - uses: actions/upload-artifact@v4
        with:
          name: gimp-palette-quantize-windows
          path: |
            build/src/gegl-palette-quantize.dll
            build/src/gimp-palette-quantize.exe
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        # brew ships gegl/babl dev files but GIMP only as an app bundle, so this
        # builds the GEGL operation only (meson warns and skips the plug-in).
        run: brew install meson ninja pkg-config gegl babl
      - name: Build (GEGL op only)
        run: |
          meson setup build
          meson compile -C build
          ls build/src/gegl-palette-quantize.*
      - uses: actions/upload-artifact@v4
        with:
          name: gimp-palette-quantize-macos
          path: build/src/gegl-palette-quantize.*
          if-no-files-found: error

  flatpak:
    # Builds against GIMP's *Flatpak* runtime (org.gnome.Sdk + GIMP's bundled
    # GEGL/babl), so the .so actually loads inside a Flatpak GIMP - which the
    # host/debian build is not guaranteed to. Mirrors build-install-flatpak.sh.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak + GIMP runtime & matching GNOME SDK
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          # ubuntu 24.04 blocks the unprivileged user namespaces bubblewrap needs
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          flatpak remote-add --if-not-exists --user flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user --noninteractive flathub org.gimp.GIMP
          branch=$(flatpak info org.gimp.GIMP \
            | sed -n 's@.*Sdk:[[:space:]]*org\.gnome\.Sdk/[^/]*/\([0-9]\+\).*@\1@p' | head -1)
          echo "Matching GNOME SDK branch: $branch"
          flatpak install -y --user --noninteractive flathub "org.gnome.Sdk//$branch"
      - name: Build inside the GIMP Flatpak SDK
        run: |
          flatpak run --devel --filesystem=host --share=network --command=bash org.gimp.GIMP -c \
            "export PKG_CONFIG_PATH=/app/lib/pkgconfig:/app/lib/x86_64-linux-gnu/pkgconfig; cd '$PWD' && meson setup build && meson compile -C build"
          test -f build/src/gegl-palette-quantize.so
      - name: Check the op registers in Flatpak GIMP (best-effort)
        run: |
          dst="$HOME/.var/app/org.gimp.GIMP/data/gegl-0.4/plug-ins"
          mkdir -p "$dst"; cp build/src/gegl-palette-quantize.so "$dst/"
          if flatpak run --command=sh org.gimp.GIMP -c 'gegl --list-all 2>/dev/null' \
               | grep -q 'custom:palette-quantize'; then
            echo "OK: custom:palette-quantize registered in Flatpak GIMP"
          else
            echo "WARN: op not listed by gegl (build still produced the .so)"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: gimp-palette-quantize-flatpak
          path: |
            build/src/gegl-palette-quantize.so
            build/src/gimp-palette-quantize
          if-no-files-found: error
